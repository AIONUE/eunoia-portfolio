<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.backgroundColor = 'white';
        div.style.color = 'red';
        div.style.padding = '20px';
        div.style.zIndex = '9999';
        div.style.overflow = 'auto';
        div.innerHTML = '<h1>Error Detected</h1>' +
          '<p><strong>Message:</strong> ' + msg + '</p>' +
          '<p><strong>URL:</strong> ' + url + '</p>' +
          '<p><strong>Line:</strong> ' + lineNo + '</p>' +
          '<p><strong>Column:</strong> ' + columnNo + '</p>' +
          '<pre>' + (error && error.stack ? error.stack : 'No stack trace') + '</pre>';
        document.body.appendChild(div);
        return false;
      };
      window.onunhandledrejection = function(event) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.backgroundColor = 'white';
        div.style.color = 'orange';
        div.style.padding = '20px';
        div.style.zIndex = '9999';
        div.style.overflow = 'auto';
        div.innerHTML = '<h1>Unhandled Promise Rejection</h1>' +
          '<p><strong>Reason:</strong> ' + event.reason + '</p>' +
          '<pre>' + (event.reason && event.reason.stack ? event.reason.stack : 'No stack trace') + '</pre>';
        document.body.appendChild(div);
      };
    </script>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif;">
        <p>Loading Application...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
